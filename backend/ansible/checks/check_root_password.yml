---
- name: Check root password reset
  hosts: rhcsa_vm
  gather_facts: false

  tasks:
    - name: Verify root password by su
      shell: echo "{{ expected_password }}" | su -c 'id' - root
      register: r_pass
      ignore_errors: yes
      no_log: true

    - name: Build check results
      set_fact:
        check_results:
          - name: "Root password is correct"
            passed: "{{ 'uid=0(root)' in (r_pass.stdout | default('')) }}"
            message: "{{ 'su succeeded: uid=0(root) confirmed' if 'uid=0(root)' in (r_pass.stdout | default('')) else 'su failed - password incorrect or account locked' }}"

    - name: Print results
      debug:
        msg: "ANSIBLE_CHECK_RESULTS={{ check_results | to_json }}"
