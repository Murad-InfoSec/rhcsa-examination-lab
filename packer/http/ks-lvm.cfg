# ks-lvm.cfg
# Kickstart for the lvm / disk-manager image variant.
# Partition layout: LVM — the 'almalinux' VG is used by Packer provisioners
# to carve out the /data logical volume after first boot.

# Basics
text
skipx
firstboot --disable
reboot

# Locale
lang en_US.UTF-8
keyboard us
timezone UTC --utc

# Network
network --bootproto=dhcp --device=eth0 --activate --onboot=on

# Auth
rootpw --lock
user --name=linus --groups=wheel --shell=/bin/bash

# Storage — LVM layout with free space left for /data LV
# Disk: 20G total. Layout leaves ~7G free in almalinux VG for provisioner to create /data.
clearpart --all --initlabel
part /boot/efi --fstype=efi --size=600
part /boot     --fstype=xfs --size=1024
part pv.01     --fstype=lvmpv --size=1 --grow

volgroup almalinux pv.01
logvol swap --vgname=almalinux --fstype=swap --size=2048 --name=swap
logvol /    --vgname=almalinux --fstype=xfs  --size=8192 --name=root
# ~8G remains free in VG for /data LV created by provisioner

# SELinux & Firewall
selinux --enforcing
firewall --enabled --service=ssh

# Services
services --enabled=sshd,firewalld

%packages --ignoremissing
@^minimal-environment
openssh-server
bash-completion
vim-minimal
firewalld
policycoreutils-python-utils
lvm2
parted
util-linux
e2fsprogs
%end

%post
mkdir -p /home/linus/.ssh
chmod 700 /home/linus/.ssh
cat > /home/linus/.ssh/authorized_keys << 'SSHEOF'
ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBdzB0/U0vxuQMf2/Df0QCaBS1RNbGSkNlJ1kaEWkW6E eduard@localhost.localdomain
SSHEOF
chmod 600 /home/linus/.ssh/authorized_keys
chown -R linus:linus /home/linus/.ssh
restorecon -Rv /home/linus/.ssh
echo '%wheel ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/wheel-nopasswd
chmod 440 /etc/sudoers.d/wheel-nopasswd
%end
