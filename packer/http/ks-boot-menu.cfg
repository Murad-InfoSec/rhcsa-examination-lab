# ks-boot-menu.cfg
# Kickstart for the boot-menu image variant.
# Partition layout: plain (same as standard-v1).
# Post-install GRUB customisation is handled by Packer shell provisioners.

# Basics
text
skipx
firstboot --disable
reboot

# Locale
lang en_US.UTF-8
keyboard us
timezone UTC --utc

# Network
network --bootproto=dhcp --device=eth0 --activate --onboot=on

# Auth
rootpw --plaintext Forgotten@1234
user --name=linus --groups=wheel --shell=/bin/bash

# Storage
clearpart --all --initlabel
autopart --type=plain

# SELinux & Firewall
selinux --enforcing
firewall --enabled --service=ssh

# Services
services --enabled=sshd,firewalld

%packages
@^minimal-environment
openssh-server
bash-completion
vim-minimal
firewalld
policycoreutils-python-utils
grub2-efi-x64
grub2-efi-x64-modules
grub2-tools-extra
efibootmgr
%end

%post
mkdir -p /home/linus/.ssh
chmod 700 /home/linus/.ssh
cat > /home/linus/.ssh/authorized_keys << 'SSHEOF'
ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBdzB0/U0vxuQMf2/Df0QCaBS1RNbGSkNlJ1kaEWkW6E eduard@localhost.localdomain
SSHEOF
chmod 600 /home/linus/.ssh/authorized_keys
chown -R linus:linus /home/linus/.ssh
restorecon -Rv /home/linus/.ssh
echo '%wheel ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/wheel-nopasswd
chmod 440 /etc/sudoers.d/wheel-nopasswd
%end
